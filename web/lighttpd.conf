server.document-root = "/var/www/html"
server.port = 80

# Serve index.html by default
index-file.names = ( "index.html" )

# Enable gzip compression for JS/CSS
server.modules += ( "mod_compress" )
compress.cache-dir = "/var/cache/lighttpd/compress/"
compress.filetype  = ( "text/html", "text/css", "application/javascript" )

# Security headers
setenv.add-response-header = (
  "X-Frame-Options" => "DENY",
  "X-Content-Type-Options" => "nosniff",
  "Referrer-Policy" => "no-referrer",
  "Content-Security-Policy" => "default-src 'self'; script-src 'self'; style-src 'self';"
)

# Logging
accesslog.filename = "/var/log/lighttpd/access.log"
errorlog.filename = "/var/log/lighttpd/error.log"

# SPA routing: rewrite everything to index.html
url.rewrite-if-not-file = ( "" => "/index.html" )

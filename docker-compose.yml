version: "3.9"

services:
  web:
    build: ./web
    container_name: chat_web
    ports:
      - "3000:80"
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - chatnet
    restart: unless-stopped

  api:
    build: 
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: chat_api
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - chatnet
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: chat_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - chatnet
  adminer:
    image: adminer:latest
    container_name: chat_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - chatnet

networks:
  chatnet:

volumes:
  pgdata:
